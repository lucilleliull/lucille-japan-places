<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucille & Sun's Tokyo List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --washi: #F5F0E8;
  --washi-warm: #FAF7F0;
  --sumi: #1C1917;
  --sumi-light: #44403C;
  --sumi-faded: #78716C;
  --beni: #B91C1C;
  --beni-soft: #DC2626;
  --ai: #1E3A5F;
  --matcha: #4D6B4A;
  --matcha-pale: #E8EDE3;
  --kincha: #C4922A;
  --kincha-light: #F5EDD8;
  --stone: #D6D3D1;
  --stone-dark: #A8A29E;

  --font-display: 'Cormorant Garamond', 'Shippori Mincho', serif;
  --font-body: 'DM Sans', 'Noto Sans JP', sans-serif;
  --font-jp: 'Shippori Mincho', 'Noto Sans JP', serif;

  --shadow-sm: 0 1px 3px rgba(28,25,23,0.05);
  --shadow-md: 0 4px 16px rgba(28,25,23,0.07);
}

html { scroll-behavior: smooth; overflow-x: hidden; }
body {
  font-family: var(--font-body);
  background: var(--washi);
  color: var(--sumi);
  line-height: 1.6;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}

/* ── Hero ── */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
  background: var(--washi-warm);
}

.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 40%, rgba(185,28,28,0.03) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 60%, rgba(30,58,95,0.02) 0%, transparent 60%);
}

.hero-content {
  position: relative; z-index: 1;
  text-align: center;
  max-width: 680px;
}

.hero-kanji {
  font-family: var(--font-jp);
  font-size: clamp(0.8rem, 1.2vw, 1rem);
  color: var(--beni);
  letter-spacing: 0.6em;
  margin-bottom: 1.5rem;
  font-weight: 400;
  opacity: 0; animation: fadeUp 1s ease-out 0.2s forwards;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(3.2rem, 8vw, 7rem);
  font-weight: 300;
  line-height: 0.92;
  letter-spacing: -0.03em;
  color: var(--sumi);
  margin-bottom: 1rem;
  opacity: 0; animation: fadeUp 1s ease-out 0.4s forwards;
}

.hero-title em {
  font-style: italic;
  color: var(--beni);
}

.hero-subtitle {
  font-size: clamp(0.85rem, 1.2vw, 1rem);
  color: var(--sumi-faded);
  max-width: 460px;
  margin: 0 auto 2.5rem;
  font-weight: 300;
  letter-spacing: 0.02em;
  opacity: 0; animation: fadeUp 1s ease-out 0.6s forwards;
}

.hero-stats {
  display: flex;
  gap: 3rem;
  justify-content: center;
  opacity: 0; animation: fadeUp 1s ease-out 0.8s forwards;
}

.hero-stat-number {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 400;
  line-height: 1;
}

.hero-stat-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--stone-dark);
  margin-top: 0.3rem;
}

.scroll-hint {
  position: absolute;
  bottom: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0; animation: fadeUp 1s ease-out 1.2s forwards;
}

.scroll-hint svg { width: 18px; color: var(--stone-dark); animation: bounce 2s ease-in-out infinite; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

/* ── Toolbar ── */
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(245,240,232,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(214,211,209,0.5);
  transition: box-shadow 0.3s ease;
}

.toolbar.scrolled { box-shadow: 0 2px 20px rgba(28,25,23,0.05); }

.toolbar-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0.8rem 2rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.toolbar-logo {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 400;
  white-space: nowrap;
  flex-shrink: 0;
}
.toolbar-logo em { font-style: italic; color: var(--beni); }

.search-box {
  flex: 1;
  min-width: 180px;
  max-width: 360px;
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 0.55rem 1rem 0.55rem 2.2rem;
  border: 1px solid var(--stone);
  border-radius: 100px;
  background: var(--washi-warm);
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 300;
  color: var(--sumi);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-box input:focus {
  border-color: var(--beni-soft);
  box-shadow: 0 0 0 3px rgba(185,28,28,0.06);
}

.search-box input::placeholder { color: var(--stone-dark); }

.search-box svg {
  position: absolute;
  left: 0.8rem; top: 50%; transform: translateY(-50%);
  width: 13px; height: 13px; color: var(--stone-dark);
}

.categories {
  display: flex;
  gap: 0.3rem;
  flex-wrap: wrap;
}

.cat-btn {
  padding: 0.35rem 0.9rem;
  border: 1px solid var(--stone);
  border-radius: 100px;
  background: transparent;
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--sumi-faded);
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.cat-btn:hover { border-color: var(--sumi-light); color: var(--sumi); }
.cat-btn.active {
  background: var(--sumi);
  color: var(--washi);
  border-color: var(--sumi);
}

.result-count {
  font-size: 0.72rem;
  color: var(--stone-dark);
  white-space: nowrap;
  margin-left: auto;
}

/* ── Places Grid ── */
.places-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 3rem 2rem 4rem;
}

.list-title {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 300;
  margin-bottom: 0.3rem;
  letter-spacing: -0.01em;
}

.list-subtitle {
  font-size: 0.78rem;
  color: var(--sumi-faded);
  margin-bottom: 2rem;
}

.places-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
  background: var(--stone);
  border: 1px solid var(--stone);
}

a.place-card, .place-card {
  display: block;
  background: var(--washi-warm);
  padding: 1.3rem 1.5rem;
  transition: background 0.2s ease;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
}

.place-card:hover { background: #FFF; }

.place-name {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 0.3rem;
  letter-spacing: -0.01em;
}

.place-category {
  display: inline-block;
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--beni);
  font-weight: 500;
  margin-bottom: 0.2rem;
}

.place-area {
  font-size: 0.72rem;
  color: var(--sumi-faded);
}

.place-note {
  font-size: 0.72rem;
  color: var(--sumi-faded);
  font-style: italic;
  margin-top: 0.3rem;
}

/* ── Section Divider ── */
.section-divider {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem;
}

.section-divider hr {
  border: none;
  height: 1px;
  background: var(--stone);
}

/* ── Footer ── */
.footer {
  max-width: 1200px;
  margin: 0 auto;
  padding: 3rem 2rem;
  text-align: center;
  font-size: 0.72rem;
  color: var(--stone-dark);
}

.footer a { color: var(--sumi-faded); text-decoration: none; }
.footer a:hover { color: var(--beni); }

/* ── Mobile ── */
@media (max-width: 640px) {
  .hero { min-height: 85vh; padding: 1.5rem; }
  .hero-stats { gap: 2rem; }
  .toolbar-inner { padding: 0.6rem 1rem; }
  .places-section { padding: 2rem 1rem 3rem; }
  .places-grid { grid-template-columns: 1fr; }
  .categories { display: none; }
}

/* No visible places state */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem 2rem;
  background: var(--washi-warm);
}

.no-results p {
  font-family: var(--font-display);
  font-size: 1.2rem;
  color: var(--sumi-faded);
}
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">

<!-- Places -->
<section class="places-section" id="section-tokyo">

<!-- Footer -->
<footer class="footer">

// ── Render ──
function getCategories() {
  const cats = new Set();
  PLACES.forEach(p => cats.add(p.cat));
  return [...cats].sort();
}

function renderGrid(places) {
  const grid = document.getElementById('grid-tokyo');
  if (!places.length) {
    grid.innerHTML = '<div class="no-results"><p>No places found</p></div>';
    return;
  }
  grid.innerHTML = places.map(p => {
    const q = encodeURIComponent(p.name + ' ' + p.area + ' Tokyo');
    const url = 'https://www.google.com/maps/search/' + q;
    return `
    <a class="place-card" data-cat="${p.cat}" href="${url}" target="_blank" rel="noopener">
      <span class="place-category">${p.cat}</span>
      <div class="place-name">${p.name}</div>
      <div class="place-area">${p.area}</div>
    </a>`;
  }).join('');
}

function renderCategories() {
  const cats = getCategories();
  const container = document.getElementById('categories');
  container.innerHTML = '<button class="cat-btn active" data-cat="all">All</button>' +
    cats.map(c => `<button class="cat-btn" data-cat="${c}">${c}</button>`).join('');
}

function filterPlaces(query, category) {
  const q = query.toLowerCase();
  const filtered = PLACES.filter(p => {
    const matchQuery = !q || p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q) || p.area.toLowerCase().includes(q);
    const matchCat = !category || category === 'all' || p.cat === category;
    return matchQuery && matchCat;
  });
  renderGrid(filtered);
  document.getElementById('result-count').textContent = filtered.length + ' places';
  document.getElementById('places-subtitle').textContent = filtered.length + ' places in Tokyo';
}

// ── Init ──
const cats = getCategories();
document.getElementById('stat-places').textContent = PLACES.length;
document.getElementById('stat-categories').textContent = cats.length;
document.getElementById('stat-lists').textContent = '1';

renderCategories();
filterPlaces('', 'all');

document.getElementById('search-input').addEventListener('input', e => {
  const activeCat = document.querySelector('.cat-btn.active')?.dataset.cat || 'all';
  filterPlaces(e.target.value, activeCat);
});

document.getElementById('categories').addEventListener('click', e => {
  if (e.target.classList.contains('cat-btn')) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    filterPlaces(document.getElementById('search-input').value, e.target.dataset.cat);
  }
});

const toolbar = document.getElementById('toolbar');
const observer = new IntersectionObserver(([e]) => {
  toolbar.classList.toggle('scrolled', !e.isIntersecting);
}, { threshold: 0 });
observer.observe(document.querySelector('.hero'));
